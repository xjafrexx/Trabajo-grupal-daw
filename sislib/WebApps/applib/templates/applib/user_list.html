<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca - Lista de Usuarios</title>
</head>
<body>
    <h1>Usuarios</h1>
    
    <ul>
        {% for usuario in usuarios %}
            <li>
                <a href="{% url 'user-detail' usuario.id %}">
                    {{ usuario.lastName }}, {{ usuario.firstName }}
                </a>
                <small>| {{ usuario.email }}</small>
                
                {% if usuario.isAdmin %}
                    <strong style="color: #007bff;">(Admin)</strong>
                {% endif %}
            </li>
        {% empty %}
            <li>No hay usuarios registrados en el sistema.</li>
        {% endfor %}
    </ul>

    <hr>
    <p>
        <a href="{% url 'book-list' %}">Ver Libros</a> | 
        <a href="{% url 'author-list' %}">Ver Autores</a>
    </p>
</body>
</html>
